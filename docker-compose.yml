services:
  web:
    build: .
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - SESSION_SECRET=change-this-secret
      - ADMIN_USERNAME=admin
      - ADMIN_PASSWORD=admin123
    volumes:
      - realstate-data:/app/dist/data
      - realstate-uploads:/app/dist/public/uploads
    restart: unless-stopped

volumes:
  realstate-data:
  realstate-uploads:
